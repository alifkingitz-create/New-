<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind for styling -->
<script src="https://cdn.tailwindcss.com"></script>
<title>Love ❤️</title>

<style>
/* ---------- GLOBAL ---------- */
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}
.page{
  display:none;
  width:100%;
  height:100vh;
  justify-content:center;
  align-items:center;
  position:absolute;
  top:0;
  left:0;
}
.active{display:flex;}

/* ---------- SWIPE BUTTON ---------- */
.swipe{
  position: relative;
  background-color: #F1F7F7;
  width: 200px;
  height: 60px;
  border-radius: 60px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}
.container{
  position:absolute;
  left:5px;
  width:50px;
  height:50px;
  background:#7AB5B7;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
}
.swipe:hover .container{
  left:calc(100% - 55px);
}

/* ---------- LOGIN ---------- */
#Container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.form{
  padding:20px;
  border-radius:10px;
  border:3px solid white;
  background:rgba(0,255,240,0.5);
  display:flex;
  flex-direction:column;
  gap:10px;
  animation: float 2s infinite;
}
@keyframes float{
  50%{transform:translateY(20px);}
}

/* ---------- PHONE + CAMERA ---------- */
.phoneContainer{
  width:185px;
  height:350px;
  background:black;
  border-radius:20px;
  position:relative;
}
.screen{
  width:180px;
  height:340px;
  border-radius:20px;
  position:absolute;
  top:4px;
  left:2px;
  overflow:hidden;
}
.camera{
  width:80px;
  height:20px;
  background:black;
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  border-radius:25px;
  animation:callTransition 1.9s infinite alternate;
}
@keyframes callTransition{
  15%{width:40px;}
  95%{width:95px;background:darkblue;}
}

/* scanner */
.scannerBox{
  width:100%;
  height:100%;
  position:relative;
}
#cameraFeed{
  width:100%;
  height:100%;
  object-fit:cover;
}
.scanLine{
  width:100%;
  height:3px;
  background:#00ffcc;
  position:absolute;
  animation:scan 2s infinite;
}
@keyframes scan{
  0%{top:0;}
  100%{top:100%;}
}

/* ---------- LOADER ---------- */
.loader .text span{
  animation: loading 1s infinite;
}
@keyframes loading{
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* ---------- ENVELOPE PAGE ---------- */
.letter-image{
  width:150px;
  height:150px;
  margin:10px;
  cursor:pointer;
  perspective:600px;
}
.animated-mail{
  position:relative;
  width:150px;
  height:100px;
  transition:0.5s;
}
.animated-mail .letter{
  position:absolute;
  width:120px;
  height:80px;
  background:white;
  left:15px;
  bottom:0;
  overflow:hidden;
  transition:0.5s;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
.letter img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.letter-image:hover .animated-mail{
  transform: translateY(-20px) rotateX(10deg) scale(1.1);
}
.letter-image:hover .letter{
  height:120px;
}

/* PHOTO OVERLAY */
#photoOverlay.hidden{
  display:none;
}
#photoOverlay{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:fixed;
  inset:0;
  background:black;
  background-opacity:0.9;
  z-index:50;
}
#photoOverlay img{
  max-width:90%;
  max-height:80%;
  margin-bottom:15px;
  border-radius:10px;
}
#photoOverlay button{
  cursor:pointer;
  font-weight:bold;
  padding:8px 16px;
  margin:5px;
  border:none;
  border-radius:8px;
}

/* ---------- MOBILE ---------- */
@media(max-width:600px){
  .phoneContainer{transform:scale(0.9);}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" src="song.mp3" loop></audio>

<!-- PAGE 1: GET STARTED -->
<div id="page1" class="page active">
  <div class="swipe" onclick="startMusic(); go(2)">
    Get Started
    <span class="container">➡</span>
  </div>
</div>

<!-- PAGE 2: LOGIN -->
<div id="page2" class="page">
  <div id="Container">
    <form class="form" onsubmit="login(event)">
      <input placeholder="UserName">
      <input id="pass" type="password" placeholder="Password">
      <button>Continue</button>
      <p id="err" style="color:red;display:none;">Wrong Password</p>
    </form>
  </div>
</div>

<!-- PAGE 3: SCANNER -->
<div id="page3" class="page">
  <div class="phoneContainer">
    <div class="screen">
      <div class="camera"></div>
      <div class="scannerBox">
        <video id="cameraFeed" autoplay playsinline></video>
        <div class="scanLine"></div>
      </div>
    </div>
  </div>
</div>

<!-- PAGE 4: LOADING -->
<div id="page4" class="page">
  <div class="loader">
    <div class="text"><span>Loading</span></div>
    <div class="text"><span>Loading</span></div>
    <div class="text"><span>Loading</span></div>
    <div class="text"><span>Loading</span></div>
  </div>
</div>

<!-- PAGE 5: NEW ENVELOPE -->
<div id="page5" class="page flex flex-wrap justify-center gap-5 items-center bg-black">
  <!-- Envelope Container -->
  <div class="envelope-container flex flex-wrap justify-center gap-5">
    <div class="letter-image" onclick="openPhoto(this)">
      <div class="animated-mail"><div class="letter"><img src="img1.jpg" alt=""></div></div>
    </div>
    <div class="letter-image" onclick="openPhoto(this)">
      <div class="animated-mail"><div class="letter"><img src="img2.jpg" alt=""></div></div>
    </div>
    <div class="letter-image" onclick="openPhoto(this)">
      <div class="animated-mail"><div class="letter"><img src="img3.jpg" alt=""></div></div>
    </div>
    <div class="letter-image" onclick="openPhoto(this)">
      <div class="animated-mail"><div class="letter"><img src="img4.jpg" alt=""></div></div>
    </div>
    <div class="letter-image" onclick="openPhoto(this)">
      <div class="animated-mail"><div class="letter"><img src="img5.jpg" alt=""></div></div>
    </div>
  </div>

  <!-- Overlay for opened photo -->
  <div id="photoOverlay" class="hidden flex flex-col justify-center items-center">
    <img id="overlayImg" src="">
    <div class="flex">
      <button onclick="closePhoto()" class="bg-pink-500 text-white">Close</button>
      <button onclick="go(6)" class="bg-green-500 text-white">Next</button>
    </div>
  </div>
</div>

<!-- PAGE 6: FINAL -->
<div id="page6" class="page flex justify-center items-center">
  <div class="text-white text-center">
    <h1 class="text-2xl text-pink-500">I Love You ❤️</h1>
    <p>You are my everything 💖</p>
  </div>
</div>

<script>
/* MUSIC */
function startMusic(){
  document.getElementById("bgMusic").play().catch(()=>{});
}

/* PAGE SWITCH */
function go(p){
  document.querySelector(".active").classList.remove("active");
  document.getElementById("page"+p).classList.add("active");

  if(p===3) startScan();
  if(p===4) setTimeout(()=>go(5),4000);
}

/* LOGIN */
function login(e){
  e.preventDefault();
  let p=document.getElementById("pass").value;
  if(p==="Sannu"){
    go(3);
  }else{
    document.getElementById("err").style.display="block";
  }
}

/* SCANNER */
function startScan(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(stream=>{
    cameraFeed.srcObject=stream;
    setTimeout(()=>go(4),3000);
  });
}

/* ENVELOPE INTERACTIONS */
function openPhoto(el){
  const img = el.querySelector('img').src;
  document.getElementById('overlayImg').src = img;
  document.getElementById('photoOverlay').classList.remove('hidden');
}
function closePhoto(){
  document.getElementById('photoOverlay').classList.add('hidden');
}
</script>

</body>
</html>
